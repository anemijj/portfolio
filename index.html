<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jimena Haddad Gagliani — Portfolio</title>
    <meta
      name="description"
      content="Portfolio minimalista de Jimena Haddad Gagliani. Proyectos editorial, 3D y web."
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=VT323&family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;1,400&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="page-home">
    <a class="skip-link" href="#main">Saltar al contenido</a>

    <header class="site-header site-header--home">
      <div class="header-inner">
        <div class="header-row">
          <div class="header-top">
            <a class="help-btn" href="random.html" aria-label="Abrir página random">
              ?
            </a>
            <h1 class="site-title">
              <a class="site-title-link" href="index.html">Jimena Haddad Gagliani</a>
            </h1>
          </div>
          <nav class="site-nav" aria-label="Navegación principal">
            <a href="#proyectos">proyectos</a>
            <a href="#contacto">contacto</a>
            <a href="#sobre-mi">sobre mi</a>
          </nav>
        </div>
      </div>
    </header>

    <main id="main" class="layout">
      <aside class="filters" aria-label="Filtros de proyectos">
        <div class="filter-list" role="list">
          <button class="filter-btn" type="button" data-filter="reciente">
            reciente
          </button>
          <button class="filter-btn" type="button" data-filter="editorial">
            editorial
          </button>
          <button class="filter-btn" type="button" data-filter="3d">3d</button>
          <button class="filter-btn" type="button" data-filter="web">web</button>
        </div>
        <button class="clear-filter" type="button" data-clear>
          limpiar filtro
        </button>
      </aside>

      <section id="proyectos" class="gallery" aria-label="Galería de proyectos">
        <div class="gallery-header">
        </div>

        <div id="galleryGrid" class="gallery-grid" role="list"></div>
      </section>
    </main>

    <script src="script.js" defer></script>
  </body>
</html>
