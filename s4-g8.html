<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>S4 G8 — Jimena Haddad Gagliani</title>
    <meta name="description" content="S4 G8 — video en sala proyectada." />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=VT323&family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;1,400&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="s4-g8.css" />
  </head>
  <body data-page="s4-g8">
    <a class="skip-link" href="#main">Saltar al contenido</a>

    <header class="site-header">
      <div class="header-inner">
        <div class="header-row header-row--twocol">
          <div class="header-top">
            <a class="help-btn" href="random.html" aria-label="Abrir página random">
              ?
            </a>
            <h1 class="site-title">
              <a class="site-title-link" href="index.html">Jimena Haddad Gagliani</a>
            </h1>
          </div>
          <span class="header-project-name">S4 G8</span>
        </div>
      </div>
    </header>

    <main id="main" class="s4-page">
      <div class="s4-hero">
        <p class="s4-hint">
          Simulación de proyección en cuatro paredes (sin techo ni piso).
          Arrastrá para girar la sala 360°.
        </p>

        <!-- Único video fuente (oculto). Los 4 canvas leen sus frames.
             Hosteado como asset de release en GitHub para evitar el límite
             de 100 MB del repo (ver release "media-s4-g8"). -->
        <video
          id="s4Src"
          class="s4-src"
          src="https://github.com/anemijj/portfolio/releases/download/media-s4-g8/S4_G8.mp4"
          muted
          loop
          playsinline
          autoplay
          preload="auto"
          aria-hidden="true"
        ></video>

        <!-- Audio (arranca muted para que el browser permita autoplay) -->
        <audio
          id="s4Audio"
          src="materia/audio.wav"
          loop
          preload="auto"
          muted
        ></audio>

        <div id="s4Scene" class="s4-scene" aria-label="Sala con video proyectado">
          <div id="s4Room" class="s4-room">
            <div class="s4-wall s4-wall--left">
              <canvas class="s4-canvas" data-q="1"></canvas>
              <span class="s4-wire" aria-hidden="true"></span>
            </div>
            <div class="s4-wall s4-wall--back">
              <canvas class="s4-canvas" data-q="2"></canvas>
              <span class="s4-wire" aria-hidden="true"></span>
            </div>
            <div class="s4-wall s4-wall--right">
              <canvas class="s4-canvas" data-q="3"></canvas>
              <span class="s4-wire" aria-hidden="true"></span>
            </div>
            <div class="s4-wall s4-wall--front">
              <canvas class="s4-canvas" data-q="4"></canvas>
              <span class="s4-wire" aria-hidden="true"></span>
            </div>
          </div>
        </div>

        <!-- Rack estilo Winamp: créditos a los costados + player al centro -->
        <div class="s4-player-rack">
          <aside
            class="s4-creds s4-creds--left"
            aria-label="Software utilizado"
          >
            <span class="s4-creds__label">MADE WITH</span>
            <div class="s4-creds__screen">
              <span>AFTER EFFECTS</span>
              <span>BLENDER</span>
              <span>FL STUDIO</span>
            </div>
          </aside>

          <div
            id="s4Player"
            class="s4-player"
            role="group"
            aria-label="Control de audio"
          >
            <button
              class="s4-player__btn"
              id="s4AudioToggle"
              type="button"
              aria-pressed="false"
              aria-label="Activar audio"
            >
              <span class="s4-player__icon" data-icon="play">▶</span>
            </button>
            <div class="s4-player__screen" aria-hidden="true">
              <span class="s4-player__marquee">PROYECCIONES</span>
              <span class="s4-player__time">
                <span id="s4AudioTime">00:00</span>
                <span class="s4-player__sep">/</span>
                <span id="s4AudioDur">--:--</span>
              </span>
            </div>
            <div class="s4-player__vol" aria-label="Volumen">
              <span class="s4-player__voltag">VOL</span>
              <input
                class="s4-player__range"
                id="s4AudioVol"
                type="range"
                min="0"
                max="100"
                value="70"
                aria-label="Volumen"
              />
              <span class="s4-player__pct" id="s4AudioPct">70</span>
            </div>
          </div>

          <aside class="s4-creds s4-creds--right" aria-label="Colaboración">
            <span class="s4-creds__label">WITH</span>
            <div class="s4-creds__screen">
              <span>GERONIMO ZIMMERMANN</span>
              <span>AMADEO RIVA</span>
            </div>
          </aside>
        </div>
      </div>
    </main>

    <script src="script.js" defer></script>
    <script src="s4-g8.js" defer></script>
  </body>
</html>
