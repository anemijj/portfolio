<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 — Jimena Haddad Gagliani</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: ui-monospace, "IBM Plex Mono", monospace;
        background: #f4f4f0;
        color: #111;
        padding: 24px;
        text-align: center;
      }
      .box {
        max-width: 40ch;
        line-height: 1.6;
      }
      a {
        color: #111;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <p><strong>No se encontró esta página</strong> (404).</p>
      <p>
        En <strong>GitHub Pages</strong> el sitio suele estar bajo
        <code>https://usuario.github.io/nombre-del-repo/</code>, no en la raíz
        <code>usuario.github.io</code> sin el nombre del repo.
      </p>
      <p><a id="home-link" href="index.html">Ir al inicio del sitio</a></p>
    </div>
    <script>
      (function () {
        const parts = window.location.pathname.split("/").filter(Boolean);
        const link = document.getElementById("home-link");
        if (!link) return;
        if (parts.length >= 1) {
          const first = parts[0];
          if (!first.includes(".")) {
            link.href = "/" + first + "/index.html";
          }
        }
      })();
    </script>
  </body>
</html>
