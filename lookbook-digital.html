  <body data-page="lookbook-digital">
    <a class="skip-link" href="#main">Saltar al contenido</a>

    <header class="site-header">
      <div class="header-inner">
        <div class="header-row header-row--twocol">
          <div class="header-top">
            <a class="help-btn" href="random.html" aria-label="Abrir página random">
              ?
            </a>
            <h1 class="site-title">
              <a class="site-title-link" href="index.html">Jimena Haddad Gagliani</a>
            </h1>
          </div>
          <span class="header-project-name">Lookbook digital</span>
        </div>
      </div>
    </header>

    <main id="main" class="lookbook-digital-page">
      <p class="lookbook-digital-hint">
        Digital Lookbook interactivo (p5.js). Elegí una estética y armá tu
        look arrastrando prendas; guardalo con el botón Guardar.
      </p>
      <div class="lookbook-digital-frame-wrap" aria-label="Lookbook digital — experiencia interactiva">
        <iframe
          class="lookbook-digital-frame"
          title="Lookbook digital — experiencia interactiva"
          src="materia/POD_HADDAD-MACCHIAVELLO_2024_FINAL/principal.html"
          referrerpolicy="no-referrer-when-downgrade"
          loading="lazy"
        ></iframe>
      </div>
    </main>

    <script>
      /* El sketch tiene tamaño nativo 1920x1280 (ancho fijo, no responsive).
         Calculamos el factor de escala para que entre completo dentro del
         contenedor (viewport menos header), sin deformar ni recortar, y
         los offsets para centrarlo. Los inyectamos como CSS vars:
           --fit-scale → transform: scale(...)
           --fit-x, --fit-y → left/top del iframe
         Se recalcula en resize y con ResizeObserver sobre el wrap. */
      (function () {
        const wrap = document.querySelector(".lookbook-digital-frame-wrap");
        const frame = document.querySelector(".lookbook-digital-frame");
        if (!wrap || !frame) return;
        const NATIVE_W = 1920;
        const NATIVE_H = 1280;
        function fit() {
          const W = wrap.clientWidth;
          const H = wrap.clientHeight;
          if (W <= 0 || H <= 0) return;
          const s = Math.min(W / NATIVE_W, H / NATIVE_H);
          const x = (W - NATIVE_W * s) / 2;
          const y = (H - NATIVE_H * s) / 2;
          frame.style.setProperty("--fit-scale", String(s));
          frame.style.setProperty("--fit-x", x + "px");
          frame.style.setProperty("--fit-y", y + "px");
        }
        /* Una pasada inmediata y otra en el siguiente frame por si el
           layout todavía no estabilizó cuando se ejecuta el script. */
        fit();
        requestAnimationFrame(fit);
        window.addEventListener("resize", fit);
        if (typeof ResizeObserver !== "undefined") {
          new ResizeObserver(fit).observe(wrap);
        }
      })();
    </script>
  </body>
</html>
